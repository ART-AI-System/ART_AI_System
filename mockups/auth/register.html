<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART-AI Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fpt-orange-gradient { background: linear-gradient(135deg, #F26F21 0%, #F79C65 100%); }
        .fpt-blue-gradient { background: linear-gradient(135deg, #0072BC 0%, #122A5E 100%); }
    </style>
</head>
<body class="h-screen flex overflow-hidden bg-[#F8F9FA]">
    
    <!-- Left Column (Register Form) -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 overflow-y-auto">
        <div class="w-full max-w-md bg-white p-10 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 my-auto">
            
            <a href="login.html" class="inline-flex items-center text-sm font-bold text-gray-400 hover:text-[#4318FF] mb-6 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Back to login
            </a>

            <div class="mb-8">
                <h2 class="text-3xl font-extrabold text-[#1B2559] mb-2">Create Account</h2>
                <p class="text-gray-500 font-medium text-sm">Join the ART-AI academic platform</p>
            </div>

            <form action="login.html" class="space-y-5">
                <!-- Full Name & Student Code -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Student Code <span class="text-red-500">*</span></label>
                        <input type="text" required class="block w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-[#4318FF] focus:border-[#4318FF] transition-colors font-medium" placeholder="SE12345">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Full Name <span class="text-red-500">*</span></label>
                        <input type="text" required class="block w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-[#4318FF] focus:border-[#4318FF] transition-colors font-medium" placeholder="John Doe">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">FPT Email Address <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input type="email" required class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-[#4318FF] focus:border-[#4318FF] transition-colors font-medium" placeholder="student@fpt.edu.vn">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Create Password <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input type="password" required class="block w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-[#4318FF] focus:border-[#4318FF] transition-colors font-medium" placeholder="••••••••">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Confirm Password <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="shield-check" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input type="password" required class="block w-full pl-11 pr-12 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-[#4318FF] focus:border-[#4318FF] transition-colors font-medium" placeholder="••••••••">
                    </div>
                </div>

                <!-- Terms -->
                <div class="flex items-start mt-2">
                    <input type="checkbox" required class="mt-1 h-4 w-4 text-[#4318FF] focus:ring-[#4318FF] border-gray-300 rounded cursor-pointer">
                    <label class="ml-2 block text-xs font-medium text-gray-600">
                        I agree to the <a href="#" class="text-[#4318FF] hover:underline font-bold">Terms of Service</a> and <a href="#" class="text-[#4318FF] hover:underline font-bold">Privacy Policy</a>, including the rules on AI declaration.
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-lg shadow-blue-500/30 text-sm font-bold text-white bg-[#4318FF] hover:bg-blue-700 focus:outline-none transition-all hover:-translate-y-0.5 mt-4">
                    Create Account
                </button>
            </form>
        </div>
    </div>

    <!-- Right Column (Branding & Graphic) -->
    <div class="hidden lg:flex w-1/2 fpt-orange-gradient relative flex-col justify-center items-center p-16 text-white overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1513258496099-48162020ce3d?auto=format&fit=crop&w=1200&q=80')] mix-blend-overlay opacity-20 object-cover"></div>
        <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-white/10 rounded-full blur-3xl translate-y-1/3 -translate-x-1/4"></div>
        
        <div class="relative z-10 text-center max-w-md">
            <div class="w-20 h-20 rounded-3xl bg-white flex items-center justify-center text-orange-500 shadow-2xl mx-auto mb-8">
                <i data-lucide="shield" class="w-10 h-10"></i>
            </div>
            <h2 class="text-4xl font-extrabold mb-4">Integrity First</h2>
            <p class="text-orange-50 text-lg leading-relaxed">ART-AI helps you maintain academic integrity while leveraging the power of modern AI tools in your workflow.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
