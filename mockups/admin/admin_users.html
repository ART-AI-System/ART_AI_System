<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART-AI Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F7FE; }
        .admin-green-gradient { background: linear-gradient(135deg, #16A34A 0%, #4ADE80 100%); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- ADMIN SIDEBAR (DARK THEME) -->
    <aside class="w-[280px] bg-[#064E3B] flex flex-col h-full shadow-2xl relative z-20">
        <!-- Logo -->
        <a href="admin_dashboard.html" class="h-24 flex items-center px-8 cursor-pointer border-b border-white/10">
            <div class="w-10 h-10 rounded-xl admin-green-gradient flex items-center justify-center text-white font-bold text-xl mr-3 shadow-lg shadow-green-500/30">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
            </div>
            <span class="text-2xl font-extrabold text-white tracking-tight">ART-AI<span class="text-[#4ADE80] text-xs align-top ml-1">ADMIN</span></span>
        </a>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 py-8 space-y-1 overflow-y-auto">
            <a href="admin_dashboard.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-4 opacity-70"></i>
                Dashboard
            </a>
            
            <a href="admin_users.html" class="flex items-center px-4 py-3.5 bg-white/10 text-white font-bold rounded-xl transition-all relative">
                <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1.5 h-8 bg-[#4ADE80] rounded-r-full"></div>
                <i data-lucide="users" class="w-5 h-5 mr-4 text-[#4ADE80]"></i>
                User Management
            </a>

            <a href="admin_semesters.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="calendar-days" class="w-5 h-5 mr-4 opacity-70"></i>
                Semesters
            </a>

            <a href="admin_classes.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="book-open" class="w-5 h-5 mr-4 opacity-70"></i>
                Classes
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- TOP HEADER -->
        <header class="h-24 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-10 sticky top-0 z-10">
            <div>
                <h1 class="text-2xl font-extrabold text-[#064E3B]">User Management</h1>
                <p class="text-sm font-medium text-gray-500 mt-1">Manage students, lecturers and roles</p>
            </div>
            
            <div class="flex items-center space-x-6">
                <button class="relative p-2.5 text-gray-400 hover:text-[#16A34A] hover:bg-green-50 rounded-xl transition-all">
                    <i data-lucide="bell" class="w-6 h-6"></i>
                    <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                </button>

                <div class="flex items-center pl-6 border-l border-gray-200 gap-3">
                    <div class="text-right">
                        <p class="text-sm font-bold text-[#064E3B]">System Admin</p>
                        <p class="text-xs font-medium text-gray-500">Administrator</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=16A34A&color=fff" alt="User" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                </div>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <div class="flex-1 overflow-y-auto p-10">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6"><div class="flex justify-between mb-6"><input type="text" placeholder="Search users..." class="border border-gray-200 rounded-xl px-4 py-2 w-64"><button class="bg-[#16A34A] text-white px-4 py-2 rounded-xl font-bold hover:bg-green-700">+ Add User</button></div><table class="w-full text-left"><tr class="text-gray-500 border-b border-gray-100"><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr><tr class="border-b border-gray-50"><td class="py-4 font-bold text-[#064E3B]">Nguyen Van A</td><td class="py-4">a@fpt.edu.vn</td><td class="py-4"><span class="bg-orange-100 text-orange-600 px-2 py-1 rounded-lg text-xs font-bold">Student</span></td><td class="py-4"><span class="text-green-600 font-medium">Active</span></td><td class="py-4 text-[#16A34A] font-medium cursor-pointer">Edit</td></tr></table></div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
