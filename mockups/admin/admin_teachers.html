<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART-AI Admin - Teachers List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F7FE; }
        .admin-green-gradient { background: linear-gradient(135deg, #16A34A 0%, #4ADE80 100%); }
        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- ADMIN SIDEBAR (DARK THEME) -->
    <aside class="w-[280px] bg-[#064E3B] flex flex-col h-full shadow-2xl relative z-20 shrink-0">
        <!-- Logo -->
        <a href="admin_dashboard.html" class="h-24 flex items-center px-8 cursor-pointer border-b border-white/10 shrink-0">
            <div class="w-10 h-10 rounded-xl admin-green-gradient flex items-center justify-center text-white font-bold text-xl mr-3 shadow-lg shadow-green-500/30">
                <i data-lucide="brain-circuit" class="w-6 h-6"></i>
            </div>
            <span class="text-2xl font-extrabold text-white tracking-tight">ART-AI<span class="text-[#4ADE80] text-xs align-top ml-1">ADMIN</span></span>
        </a>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
            <a href="admin_dashboard.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-4 opacity-70"></i>
                Dashboard
            </a>
            
            <div class="pt-4 pb-2">
                <p class="px-4 text-xs font-bold text-green-300 uppercase tracking-wider">Users</p>
            </div>

            <a href="admin_students.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="graduation-cap" class="w-5 h-5 mr-4 opacity-70"></i>
                Students
            </a>

            <!-- Employees Dropdown -->
            <div class="relative group">
                <button class="flex items-center px-4 py-3.5 bg-white/10 text-white font-bold rounded-xl transition-all relative w-full justify-between">
                    <div class="flex items-center">
                        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1.5 h-8 bg-[#4ADE80] rounded-r-full"></div>
                        <i data-lucide="briefcase" class="w-5 h-5 mr-4 text-[#4ADE80]"></i>
                        Employees
                    </div>
                    <i data-lucide="chevron-down" class="w-4 h-4 opacity-70"></i>
                </button>
                <div class="pl-12 pr-4 py-2 space-y-1 hidden group-hover:block">
                    <a href="admin_teachers.html" class="block py-2 text-sm text-green-200 hover:text-white transition-colors">Lecturers</a>
                    <a href="#" class="block py-2 text-sm text-green-200 hover:text-white transition-colors">Head Subjects</a>
                </div>
            </div>

            <div class="pt-4 pb-2">
                <p class="px-4 text-xs font-bold text-green-300 uppercase tracking-wider">Academic</p>
            </div>

            <a href="admin_semesters.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="calendar-days" class="w-5 h-5 mr-4 opacity-70"></i>
                Semesters
            </a>

            <a href="admin_subjects.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="library" class="w-5 h-5 mr-4 opacity-70"></i>
                Subjects
            </a>

            <a href="admin_classes.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="book-open" class="w-5 h-5 mr-4 opacity-70"></i>
                Classes
            </a>
            
            <div class="pt-4 pb-2">
                <p class="px-4 text-xs font-bold text-green-300 uppercase tracking-wider">Communication</p>
            </div>

            <a href="admin_messages.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="message-circle" class="w-5 h-5 mr-4 opacity-70"></i>
                Messages
            </a>

            <a href="admin_feedback.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="clipboard-list" class="w-5 h-5 mr-4 opacity-70"></i>
                Feedback & Reports
            </a>

            <div class="pt-4 pb-2">
                <p class="px-4 text-xs font-bold text-green-300 uppercase tracking-wider">System</p>
            </div>

            <a href="admin_settings.html" class="flex items-center px-4 py-3.5 text-green-100 hover:text-white font-medium rounded-xl transition-all hover:bg-white/5">
                
                <i data-lucide="settings" class="w-5 h-5 mr-4 opacity-70"></i>
                Settings
            </a>
        </nav>
        
        <!-- Logout Section -->
        <div class="p-4 border-t border-white/10 shrink-0">
            <a href="../auth/login.html" class="flex items-center px-4 py-3.5 text-red-300 hover:text-white hover:bg-red-500/20 font-medium rounded-xl transition-all">
                <i data-lucide="log-out" class="w-5 h-5 mr-4 opacity-90"></i>
                Log Out
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- TOP HEADER -->
        <header class="h-24 bg-white/80 backdrop-blur-md border-b border-gray-100 flex items-center justify-between px-10 sticky top-0 z-10 shrink-0">
            <div>
                <h1 class="text-2xl font-extrabold text-[#064E3B]">Teachers List</h1>
                <p class="text-sm font-medium text-gray-500 mt-1">Home / Teachers</p>
            </div>
            
            <div class="flex items-center space-x-6">
                <div class="relative">
                    <input type="text" placeholder="What do you want to find?" class="bg-gray-50 border border-gray-200 rounded-full px-5 py-2.5 pl-12 focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-all text-sm w-64 text-[#064E3B] font-medium">
                    <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                </div>

                <button class="relative p-2.5 text-gray-400 hover:text-[#16A34A] hover:bg-green-50 rounded-xl transition-all">
                    <i data-lucide="bell" class="w-6 h-6"></i>
                    <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                </button>

                <div class="flex items-center pl-6 border-l border-gray-200 gap-3 cursor-pointer">
                    <div class="text-right">
                        <p class="text-sm font-bold text-[#064E3B]">Priscilla Lily</p>
                        <p class="text-xs font-medium text-gray-500">Admin</p>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=16A34A&color=fff" alt="User" class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                </div>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <div class="flex-1 overflow-y-auto p-10">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6"><div class="flex justify-between items-center mb-6"><h3 class="font-bold text-[#064E3B] text-lg">Teachers Information</h3><button class="bg-[#16A34A] text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-green-700 flex items-center"><i data-lucide="plus" class="w-4 h-4 mr-2"></i>Add Teacher</button></div><p class="text-gray-500">List of all active teachers and head subjects.</p></div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
